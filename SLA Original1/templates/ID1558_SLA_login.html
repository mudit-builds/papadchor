<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #2f9ab7, #6fc3d6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: #ffffff;
            width: 380px;
            padding: 30px 35px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .auth-card h2 {
            text-align: center;
            color: #2f9ab7;
            margin-bottom: 25px;
        }

        .auth-card input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .auth-card input:focus {
            outline: none;
            border-color: #2f9ab7;
        }

        .auth-card button {
            width: 100%;
            padding: 10px;
            background: #2f9ab7;
            border: none;
            color: white;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .auth-card button:hover {
            background: #23849e;
        }

        .auth-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .auth-footer a {
            color: #2f9ab7;
            text-decoration: none;
            font-weight: 500;
        }

        .flash-error {
            color: #c0392b;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Login</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="flash-error">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
