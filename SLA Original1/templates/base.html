<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Calculator - NetPenalty</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='table.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <h2 class="mb-4">
            NetPenalty — SLA Compliance Calculator
        </h2>
        
        <!-- Top Action Bar -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap;">
            <div class="top-bar" style="flex: 1; min-width: 200px;">
                <span class="welcome-text">
                    <b>Welcome, {{ session['user'] }}</b>
                </span>
            </div>
            <div style="display: flex; gap: 10px;">
                <form action="/report" method="GET" style="margin: 0;">
                    <button class="btn btn-primary" type="submit">📊 Get Report</button>
                </form>
                <a href="{{ url_for('logout') }}" class="logout-btn">🚪 Logout</a>
            </div>
        </div>
        
        <!-- Search Form -->
        <form action="/search" method="POST">
            <div class="input-group mb-3">
                <label for="name" class="form-label">Service Request:</label>
                <input type="text" class="form-control" id="name" name="name" 
                       placeholder="Enter SR number(s), comma-separated">
                
                <label for="inc_name" class="form-label">Incidents:</label>
                <input type="text" class="form-control" id="inc_name" name="inc_name" 
                       placeholder="Enter incident number(s), comma-separated">
                
                <button class="btn btn-primary" type="submit">🔍 Search</button>
                
                <div style="display: flex; align-items: center; gap: 8px; margin-left: 20px;">
                    <input type="checkbox" id="chk_u_red" name="chk_u_red" value="Y">
                    <label for="chk_u_red" class="form-label" style="margin: 0;">Show updated values</label>
                </div>
            </div>
        </form>
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-message flash-error">
                {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}
        
        <!-- Content Area -->
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
